<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1218">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedBank">
<title>MedBank</title>
<style>
:root{
  --bg:#0f1218; --panel:#161b24; --panel2:#1c222d; --line:#252d3a;
  --text:#e6eaf2; --dim:#93a0b5; --dimmer:#6b7889;
  --accent:#4f8cff; --ped:#3ecf8e; --og:#c77dff; --com:#ffb454;
  --primer:#4f8cff; --recall:#3ecf8e;
  --radius:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{background:var(--bg);color:var(--text);
  font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

#shell{display:flex;min-height:100%}
#sidebar{width:248px;flex:0 0 248px;background:var(--panel);border-right:1px solid var(--line);
  padding:18px 12px;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:50}
#main{margin-left:248px;flex:1;min-width:0;padding:28px 32px 80px;max-width:1000px}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 18px;font-weight:700;font-size:19px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
.navlabel{font-size:11px;letter-spacing:.9px;text-transform:uppercase;color:var(--dimmer);padding:16px 12px 7px;font-weight:600}
.navitem{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:var(--dim);
  cursor:pointer;font-size:14.5px;font-weight:500;margin-bottom:2px;transition:background .12s,color .12s}
.navitem:hover{background:var(--panel2);color:var(--text)}
.navitem.active{background:var(--accent);color:#fff}
.navitem .ic{width:20px;text-align:center;font-size:15px;flex:0 0 20px}
.navitem .badge{margin-left:auto;font-size:11px;color:var(--dimmer);font-weight:600}
.navitem.active .badge{color:rgba(255,255,255,.85)}

#hamburger{display:none;position:fixed;top:12px;left:12px;z-index:70;background:var(--panel);
  border:1px solid var(--line);color:var(--text);width:42px;height:42px;border-radius:10px;font-size:19px;cursor:pointer}
#scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40}
@media(max-width:820px){
  #sidebar{transform:translateX(-100%);transition:transform .22s ease;width:270px}
  body.navopen #sidebar{transform:none}
  body.navopen #scrim{display:block}
  #main{margin-left:0;padding:66px 16px 90px;max-width:100%}
  #hamburger{display:block}
}

h1{font-size:27px;margin:0 0 6px;letter-spacing:-.3px}
h2{font-size:20px;margin:34px 0 12px}
.sub{color:var(--dim);font-size:14.5px;margin:0 0 26px}
.crumb{font-size:13.5px;color:var(--dim);margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.crumb .sep{color:var(--dimmer)}
.crumb a{color:var(--dim);cursor:pointer}
.crumb a:hover{color:var(--accent)}
.grid{display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;
  cursor:pointer;transition:border-color .14s,transform .14s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card h3{margin:0 0 5px;font-size:16.5px;font-weight:600}
.card p{margin:0;color:var(--dim);font-size:13.5px}
.pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  padding:3px 9px;border-radius:99px;margin-bottom:9px}
.empty{border:1px dashed var(--line);border-radius:var(--radius);padding:34px 22px;text-align:center;
  color:var(--dim);font-size:14.5px;background:var(--panel)}
.stats{display:flex;gap:11px;flex-wrap:wrap;margin:0 0 28px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 17px;min-width:104px}
.stat b{display:block;font-size:23px;line-height:1.25}
.stat span{font-size:12px;color:var(--dim)}

/* topic rows */
.modhead{font-size:12px;letter-spacing:.9px;text-transform:uppercase;color:var(--dimmer);
  font-weight:700;margin:30px 0 11px}
.rows{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel)}
.row{display:flex;align-items:center;gap:13px;padding:12px 15px;border-bottom:1px solid var(--line);
  cursor:pointer;transition:background .12s}
.row:last-child{border-bottom:0}
.row:hover{background:var(--panel2)}
.row .sn{flex:0 0 30px;color:var(--dimmer);font-size:13px;font-variant-numeric:tabular-nums;font-weight:600}
.row .mid{flex:1;min-width:0}
.row .tt{font-size:15.2px;font-weight:550;line-height:1.4}
.row .meta{font-size:12.5px;color:var(--dim);margin-top:2px}
.row .st{flex:0 0 auto;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;white-space:nowrap}
.st.ready{background:#3ecf8e1f;color:var(--recall)}
.st.todo{background:#6b78891f;color:var(--dimmer)}
.row.todo .tt{color:var(--dim);font-weight:500}
@media(max-width:560px){
  .row{padding:11px 12px;gap:9px}
  .row .sn{flex:0 0 22px;font-size:12px}
  .row .tt{font-size:14.3px}
  .row .st{font-size:9.5px;padding:3px 7px}
}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin:22px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 15px;color:var(--dim);cursor:pointer;font-size:14.5px;font-weight:500;
  border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.md{font-size:16px}
.md h1{font-size:25px;margin:0 0 14px;padding-bottom:11px;border-bottom:1px solid var(--line)}
.md h2{font-size:19.5px;margin:30px 0 9px;color:#fff}
.md h3{font-size:16.5px;margin:22px 0 7px;color:var(--dim)}
.md p{margin:0 0 13px}
.md ul,.md ol{margin:0 0 15px;padding-left:23px}
.md li{margin-bottom:6px}
.md strong{color:#fff;font-weight:650}
.md code{background:var(--panel2);padding:2px 6px;border-radius:5px;font-size:14px}
.md hr{border:0;border-top:1px solid var(--line);margin:26px 0}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--panel);color:var(--text);
  border:1px solid var(--line);padding:11px 17px;border-radius:10px;cursor:pointer;
  font-size:14.5px;font-weight:600;font-family:inherit}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.green{background:var(--recall);border-color:var(--recall);color:#04231a}
.btn:disabled{opacity:.4;cursor:default}

.studywrap{max-width:760px;margin:0 auto}
.studytop{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.studytop .name{font-weight:650;font-size:15px}
.counter{margin-left:auto;color:var(--dim);font-size:13.5px;font-variant-numeric:tabular-nums}
.bar{height:4px;background:var(--panel2);border-radius:9px;overflow:hidden;margin-bottom:22px}
.bar>div{height:100%;transition:width .25s}
.flash{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px 26px;
  min-height:230px;cursor:pointer}
.flash .qlabel{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--dimmer);font-weight:700;margin-bottom:11px}
.flash .q{font-size:20.5px;font-weight:600;line-height:1.45}
.taphint{text-align:center;color:var(--dimmer);font-size:13px;margin-top:26px}
.ansblock{margin-top:24px;padding-top:22px;border-top:1px solid var(--line);animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.seg{margin-bottom:20px}.seg:last-child{margin-bottom:0}
.seglabel{font-size:11px;letter-spacing:.9px;text-transform:uppercase;font-weight:700;margin-bottom:8px;
  display:inline-block;padding:3px 9px;border-radius:6px}
.seg .body{font-size:16.5px;line-height:1.78;letter-spacing:.1px}
.seg .body p{margin:0 0 15px}.seg .body p:last-child{margin:0}
.seg.lecturer .body{border-left:3px solid var(--dimmer);padding-left:15px;color:#dfe6f2}
.seg .body .stepq{
  font-size:15px;font-weight:700;color:#fff;margin:30px 0 13px;line-height:1.5;
  padding-left:13px;border-left:3px solid var(--primer);
}
.seg .body .stepq:first-child{margin-top:0}
.seg .body .substepq{
  font-size:14.5px;font-weight:650;color:var(--text);margin:22px 0 11px;line-height:1.5;
  padding-left:13px;border-left:2px solid var(--dimmer);
}
.seg .body ul.airy{list-style:none;margin:0 0 16px;padding:0}
.seg .body ul.airy li{position:relative;padding-left:20px;margin-bottom:9px}
.seg .body ul.airy li::before{
  content:"";position:absolute;left:3px;top:11px;width:5px;height:5px;
  border-radius:50%;background:var(--dimmer);
}
.seg .body hr.soft{border:0;border-top:1px solid var(--line);margin:26px 0}
.seg .body .takeaway{
  background:#4f8cff14;border-left:3px solid var(--primer);border-radius:0 9px 9px 0;
  padding:13px 16px;margin:18px 0;font-weight:550;color:#fff;line-height:1.65;
}
.seg.tie .body .takeaway{background:#ffb45414;border-left-color:var(--com)}
.seg .body table.mini{width:100%;border-collapse:collapse;margin:16px 0 20px;font-size:15px}
.seg .body table.mini th{
  text-align:left;padding:9px 12px;color:var(--dim);font-weight:600;font-size:12.5px;
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line);
}
.seg .body table.mini td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.seg .body table.mini tr:last-child td{border-bottom:0}

/* ---------- images ---------- */
.figrow{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0 6px}
.figrow.multi>.fig{flex:1 1 220px}
.fig{margin:0;flex:1 1 100%;min-width:0}
.fig img{
  width:100%;height:auto;display:block;border-radius:10px;border:1px solid var(--line);
  background:#fff;cursor:zoom-in;
}
.fig figcaption,.figcap{
  font-size:13px;color:var(--dim);margin-top:8px;line-height:1.5;text-align:center;
}
.figcap{margin-bottom:14px}
.md .figrow{margin:20px 0 8px}
.lightbox{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  padding:16px;cursor:zoom-out;
}
.lightbox img{max-width:100%;max-height:88vh;object-fit:contain;border-radius:6px}
.lbhint{color:var(--dimmer);font-size:13px;margin-top:14px}
.imgbadge{
  display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:99px;
  background:#c77dff22;color:var(--og);margin-left:8px;
}
.navbtns{display:flex;gap:10px;margin-top:22px}
.navbtns .btn{flex:1;justify-content:center}
.kbd{color:var(--dimmer);font-size:12.5px;text-align:center;margin-top:16px}
@media(max-width:820px){.kbd{display:none}.flash{padding:24px 19px}.flash .q{font-size:19px}}

.step{display:flex;gap:15px;margin-bottom:19px;align-items:flex-start}
.stepnum{flex:0 0 29px;height:29px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-top:1px}
.step .txt b{display:block;margin-bottom:3px;font-size:15.5px}
.step .txt span{color:var(--dim);font-size:14.5px}
pre.copy{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:16px;
  white-space:pre-wrap;word-break:break-word;font-size:13.5px;line-height:1.65;color:var(--dim);
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

/* ---- status chips on topic rows ---- */
.st.new{background:#6b78891f;color:var(--dim)}
.st.learn{background:#ffb4541f;color:var(--com)}
.st.done{background:#3ecf8e1f;color:var(--recall)}

/* ---- dashboard ---- */
.dash{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 20px 18px;margin-bottom:28px}
.dashtop{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.fire{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#ff6a3d18,#ffb45410);border:1px solid #ff8a4d33;border-radius:14px;
  padding:12px 20px;min-width:118px}
.fire .n{font-size:38px;font-weight:800;line-height:1;color:#ff8a4d}
.fire .l{font-size:12px;color:var(--dim);margin-top:4px;font-weight:600}
.dgoal{flex:1;min-width:210px}
.dgrow{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;color:var(--dim);margin-bottom:8px}
.dgrow b{font-size:18px;color:var(--text);font-variant-numeric:tabular-nums}
.dbar{height:10px;background:var(--panel2);border-radius:99px;overflow:hidden}
.dbar>div{height:100%;background:linear-gradient(90deg,var(--recall),#6be3ad);transition:width .3s}
.goalhit{margin-top:9px;font-size:13px;color:var(--recall);font-weight:600}
.dmetrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
.dm{background:var(--panel2);border-radius:11px;padding:11px 6px;text-align:center}
.dm b{display:block;font-size:22px;line-height:1.2;font-variant-numeric:tabular-nums}
.dm span{font-size:11.5px;color:var(--dim)}
@media(max-width:560px){.dmetrics{grid-template-columns:repeat(2,1fr)}.fire{min-width:0;flex:1}}

/* ---- progress rings/bars ---- */
.rings{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.ringcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;cursor:pointer;transition:border-color .14s}
.ringcard:hover{border-color:var(--accent)}
.ringtop{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600}
.ringtop b{margin-left:auto;font-size:16px;font-variant-numeric:tabular-nums}
.pbar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:11px 0 8px}
.pbar>div{height:100%;transition:width .3s}
.ringmeta{font-size:12.5px;color:var(--dim)}

/* ---- heatmap ---- */
.heatwrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;overflow-x:auto}
.heat{display:flex;gap:3px;min-width:max-content}
.hcol{display:flex;flex-direction:column;gap:3px}
.hc{width:13px;height:13px;border-radius:3px;background:var(--panel2);display:block}
.hc.off{background:transparent}
.hc.l0{background:#20262f}.hc.l1{background:#123a2b}.hc.l2{background:#1f6e4d}
.hc.l3{background:#2fa46f}.hc.l4{background:#4be3a0}
.heatlegend{display:flex;align-items:center;gap:5px;justify-content:flex-end;margin-top:11px;font-size:12px;color:var(--dim)}
.heatlegend .hc{width:11px;height:11px}

/* ---- today / session ---- */
.todaybar{display:flex;align-items:center;gap:12px;margin-bottom:16px;max-width:760px;margin-left:auto;margin-right:auto}
.alldone,.summary{max-width:640px;margin:20px auto;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:32px 26px;text-align:center}
.alldone .big{font-size:52px;color:var(--recall);line-height:1}
.alldone b{display:block;font-size:20px;margin:12px 0 8px}
.alldone p{color:var(--dim);font-size:14.5px;margin:0 auto 20px;max-width:440px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sm b{display:block;font-size:30px;line-height:1.1;font-variant-numeric:tabular-nums}
.sm span{font-size:12px;color:var(--dim)}
.sflame{font-size:19px;font-weight:700;color:#ff8a4d;margin-bottom:6px}
@media(max-width:520px){.sgrid{grid-template-columns:repeat(2,1fr)}}

/* ---- rating buttons ---- */
.ratebtns{display:flex;gap:12px;margin-top:22px}
.ratebtns .btn{flex:1;justify-content:center;font-size:16px;padding:15px}
.btn.got{background:var(--recall);border-color:var(--recall);color:#04231a}
.btn.miss{background:#2a1c22;border-color:#7a3b4d;color:#ff9db1}

/* ---- topic status selector ---- */
.statusbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--panel);
  border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-bottom:18px}
.statusbar .slabel{font-size:13px;color:var(--dim);font-weight:600}
.ssegs{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.sseg{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:8px;
  padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.sseg:hover{color:var(--text);border-color:var(--accent)}
.sseg.on{background:var(--accent);border-color:var(--accent);color:#fff}
@media(max-width:560px){.statusbar .slabel{width:100%}.ssegs{margin-left:0}.sseg{flex:1;text-align:center}}

/* ---- star (hard card) button ---- */
.flash{position:relative}
.starbtn{position:absolute;top:14px;right:14px;background:transparent;border:0;cursor:pointer;
  font-size:22px;line-height:1;color:var(--dimmer);padding:4px;font-family:inherit}
.starbtn:hover{color:var(--com)}
.starbtn.on{color:var(--com)}
.flash .qlabel{padding-right:38px}

/* ---- today's plan ---- */
.plan{display:flex;flex-direction:column;gap:12px;max-width:640px}
.planitem{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px 17px}
.planitem.done{opacity:.66}
.pi-ic{flex:0 0 34px;height:34px;border-radius:9px;background:var(--panel2);display:flex;align-items:center;
  justify-content:center;font-size:17px}
.planitem.done .pi-ic{background:#3ecf8e22;color:var(--recall)}
.pi-mid{flex:1;min-width:0}
.pi-mid b{display:block;font-size:15.5px;margin-bottom:3px}
.pi-mid span{color:var(--dim);font-size:13.5px}

/* ---- achievements ---- */
.achgrid{display:grid;gap:11px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
.ach{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 13px;text-align:center;opacity:.4;filter:grayscale(1)}
.ach.on{opacity:1;filter:none;border-color:#ffb45455}
.ach .ai{font-size:26px;display:block;margin-bottom:6px}
.ach b{display:block;font-size:13.5px;margin-bottom:3px}
.ach .ad{font-size:11.5px;color:var(--dim);line-height:1.4}

/* ---- weekly grid ---- */
.wgrid{display:flex;gap:9px;flex-wrap:wrap}
.wday{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 10px;text-align:center;min-width:60px;flex:1}
.wday .hc{width:100%;height:26px;border-radius:6px;margin-bottom:7px}
.wday span{font-size:11px;color:var(--dimmer);display:block}
.wday b{font-size:16px;font-variant-numeric:tabular-nums}

/* ---- search ---- */
.sbox{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:11px;padding:13px 15px;font-size:15.5px;font-family:inherit;margin-bottom:20px}
.sbox:focus{outline:none;border-color:var(--accent)}

/* ---- streak freeze + level + exam chips + floor marker ---- */
.fire{position:relative}
.frz{position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);white-space:nowrap;
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#1a2733;color:#7fb4ff}
.frz.used{background:#2a2320;color:var(--dimmer)}
.dbar{position:relative}
.floormark{position:absolute;top:-2px;width:2px;height:14px;background:var(--com);border-radius:2px;transform:translateX(-1px)}
.lvlbar{margin-top:16px}
.lvltop{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:7px}
.lvltop span{font-weight:700;color:var(--og)}
.lvltop b{font-size:12px;color:var(--dim);font-weight:600}
.examrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.examchip{font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:99px;cursor:pointer;
  background:var(--panel2);border:1px solid var(--line);color:var(--dim)}
.examchip b{color:var(--text)}
.examchip.soon{background:#ff6a3d18;border-color:#ff8a4d55;color:#ffb08a}
.examchip.soon b{color:#ff8a4d}

/* ---- session modes bar ---- */
.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.modebtn{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 8px;cursor:pointer;
  font-family:inherit;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color .14s,transform .14s}
.modebtn:hover{border-color:var(--accent);transform:translateY(-2px)}
.modebtn.dis{opacity:.42;cursor:default;pointer-events:none}
.modebtn .mic{font-size:20px}
.modebtn b{font-size:13.5px}
.modebtn .msub{font-size:11px;color:var(--dim)}
@media(max-width:560px){.modes{grid-template-columns:repeat(2,1fr)}}

/* ---- settings ---- */
.setrow{display:flex;align-items:center;gap:16px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:14px 16px;margin-bottom:10px}
.setrow>div:first-child{flex:1;min-width:0}
.setrow b{display:block;font-size:14.5px;margin-bottom:2px}
.setrow span{font-size:12.5px;color:var(--dim);line-height:1.45}
.numin,.datein,.timein{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:9px;padding:9px 11px;font-size:14.5px;font-family:inherit}
.numin{width:78px;text-align:center}
.toggle{width:50px;height:28px;border-radius:99px;border:1px solid var(--line);background:var(--panel2);
  position:relative;cursor:pointer;flex:0 0 auto;transition:background .16s}
.toggle i{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--dim);transition:left .16s,background .16s}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle.on i{left:24px;background:#fff}
@media(max-width:560px){.setrow{flex-wrap:wrap}.numin{width:100%}}

/* ---- micro-celebrations ---- */
.celebrate{position:fixed;inset:0;z-index:300;pointer-events:none;overflow:hidden}
.celebits span{position:absolute;top:-30px;animation:cfall 1.7s ease-in forwards}
@keyframes cfall{0%{transform:translateY(-30px) rotate(0);opacity:0}
  10%{opacity:1}100%{transform:translateY(105vh) rotate(320deg);opacity:0}}
.updbanner{position:fixed;left:12px;right:12px;bottom:14px;z-index:420;background:var(--panel);
  border:1px solid var(--accent);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;box-shadow:0 10px 40px rgba(0,0,0,.5);max-width:560px;margin:0 auto}
.updbanner span{flex:1;font-size:14px;font-weight:600;min-width:160px}
.updbanner .btn{padding:9px 14px}
.strictov{position:fixed;inset:0;z-index:400;background:rgba(9,11,15,.86);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.strictbox{background:var(--panel);border:1px solid #ff8a4d55;border-radius:18px;padding:30px 26px;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.strictbox .sbig{font-size:46px;line-height:1;margin-bottom:8px}
.strictbox b{display:block;font-size:20px;margin-bottom:6px}
.strictbox p{color:var(--dim);font-size:14.5px;margin:0 0 20px}
.strictbox .btn{width:100%;justify-content:center;margin-bottom:9px}
.celebanner{position:fixed;top:22%;left:50%;transform:translateX(-50%);background:rgba(15,18,24,.94);
  border:1px solid var(--line);border-radius:14px;padding:14px 22px;font-weight:700;font-size:16px;
  color:#fff;animation:cpop .4s ease;box-shadow:0 10px 40px rgba(0,0,0,.5)}
@keyframes cpop{0%{transform:translateX(-50%) scale(.7);opacity:0}60%{transform:translateX(-50%) scale(1.08)}100%{transform:translateX(-50%) scale(1);opacity:1}}

/* ---- Active Recall Hub ---- */
.health{display:flex;align-items:center;gap:20px;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:18px 20px;margin-bottom:16px;border-left:4px solid var(--dim)}
.health.good{border-left-color:var(--recall)}
.health.ok{border-left-color:var(--com)}
.health.bad{border-left-color:#ff6a6a}
.hleft{text-align:center;flex:0 0 auto}
.hbig{font-size:40px;font-weight:800;line-height:1}
.hbig span{font-size:18px;color:var(--dim)}
.hstat{font-size:12.5px;font-weight:600;color:var(--dim);margin-top:3px}
.hmetrics{display:flex;gap:22px;margin-left:auto;flex-wrap:wrap}
.hmetrics>div{text-align:center}
.hmetrics b{display:block;font-size:22px;font-variant-numeric:tabular-nums}
.hmetrics span{font-size:11.5px;color:var(--dim)}
@media(max-width:560px){.health{flex-wrap:wrap}.hmetrics{margin-left:0;gap:16px}}

.arcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:26px}
.artop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.artop b{font-size:16px}
.artime{font-size:13px;color:var(--dim);font-weight:600}
.arrows{display:flex;flex-direction:column;gap:2px;margin-bottom:12px}
.arrow{display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid var(--line)}
.arrow:last-child{border-bottom:0}
.arrow .aic{font-size:15px;width:22px;text-align:center}
.arrow .alabel{flex:1;font-size:14.5px}
.arrow .acount{font-weight:700;font-variant-numeric:tabular-nums;font-size:15px}
.arover{font-size:12.5px;color:var(--com);margin-bottom:12px}
.arprog{margin-bottom:14px}
.arprog .dbar{margin-bottom:6px}
.arprog span{font-size:12.5px;color:var(--dim)}
.arstart{width:100%;justify-content:center;font-size:16px;padding:15px}

/* ---- session completion meter ---- */
.meter{max-width:760px;margin:0 auto 14px}
.mbar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-bottom:7px}
.mbar>div{height:100%;background:linear-gradient(90deg,var(--recall),#6be3ad);transition:width .3s}
.mrow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--dim)}
.mrow b{color:var(--text)}
.confbanner{max-width:760px;margin:0 auto 12px;background:#c77dff18;border:1px solid #c77dff44;color:#d8b3ff;
  border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;text-align:center}

/* ---- done-for-today ---- */
.donecard{max-width:640px;margin:20px auto;background:var(--panel);border:1px solid var(--line);
  border-radius:16px;padding:30px 26px;text-align:center}
.donecard.clear{border-color:#3ecf8e55;box-shadow:0 0 40px #3ecf8e14}
.donetick{font-size:48px;line-height:1;margin-bottom:4px}

/* ---- topic pipeline ---- */
.pipe{display:flex;align-items:center;gap:0;overflow-x:auto;padding:6px 2px 14px;margin-bottom:6px;scrollbar-width:none}
.pipe::-webkit-scrollbar{display:none}
.pstep{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;min-width:58px}
.pstep i{width:16px;height:16px;border-radius:50%;background:var(--panel2);border:2px solid var(--line)}
.pstep span{font-size:10.5px;color:var(--dimmer);white-space:nowrap}
.pstep.done i{background:var(--recall);border-color:var(--recall)}
.pstep.done span{color:var(--dim)}
.pstep.on i{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent)22}
.pstep.on span{color:var(--text);font-weight:700}
.pline{flex:1;height:2px;background:var(--line);min-width:14px;margin-top:-16px}
</style>
</head>
<body>

<button id="hamburger" onclick="document.body.classList.toggle('navopen')">☰</button>
<div id="scrim" onclick="document.body.classList.remove('navopen')"></div>

<div id="shell">
  <nav id="sidebar">
    <div class="brand"><span class="dot"></span> MedBank</div>
    <div id="nav"></div>
  </nav>
  <main id="main"></main>
</div>

<script src="content.js"></script>
<script>
const DB = window.MEDBANK || {subjects:[],lecturers:[],stats:{}};
const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const COLOR = {'pediatrics':'var(--ped)','og':'var(--og)','community-medicine':'var(--com)'};

/* ---------- images ---------- */
let IMGBASE = '';                       // set per topic before rendering
const imgSrc = f => /^https?:|^content\//.test(f) ? f : IMGBASE + encodeURIComponent(f);
function figure(file, caption){
  return `<figure class="fig"><img src="${imgSrc(file)}" alt="${esc(caption||'')}" loading="lazy"
     onclick="zoom(this.src)">${caption?`<figcaption>${esc(caption)}</figcaption>`:''}</figure>`;
}
function imgBlock(v, caption){
  const list = Array.isArray(v) ? v : [v];
  return `<div class="figrow${list.length>1?' multi':''}">`
       + list.map((f,i)=>figure(f, list.length===1?caption:'')).join('')
       + `</div>${list.length>1&&caption?`<div class="figcap">${esc(caption)}</div>`:''}`;
}
function zoom(src){
  const o=document.createElement('div');
  o.className='lightbox';
  o.innerHTML=`<img src="${src}"><div class="lbhint">Tap anywhere to close</div>`;
  o.onclick=()=>o.remove();
  document.body.appendChild(o);
}

function md(src){
  if(!src) return '<p style="color:var(--dim)">Nothing here yet.</p>';
  const inline = t => esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^\*])\*([^\*]+?)\*/g,'$1<em>$2</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
  const out=[]; let list=null;
  const close=()=>{if(list){out.push('</'+list+'>');list=null;}};
  src.split(/\r?\n/).forEach(raw=>{
    const l=raw.trim(); if(!l){close();return;}
    let m;
    if(l==='---'){close();out.push('<hr>');return;}
    if((m=l.match(/^!\[(.*?)\]\((.+?)\)\s*$/))){close();out.push(imgBlock(m[2].replace(/^img\//,''),m[1]));return;}
    if((m=l.match(/^(#{1,4})\s+(.*)/))){close();out.push(`<h${m[1].length}>${inline(m[2])}</h${m[1].length}>`);return;}
    if((m=l.match(/^\d+\.\s+(.*)/))){if(list!=='ol'){close();out.push('<ol>');list='ol';}out.push('<li>'+inline(m[1])+'</li>');return;}
    if((m=l.match(/^[-*]\s+(.*)/))){if(list!=='ul'){close();out.push('<ul>');list='ul';}out.push('<li>'+inline(m[1])+'</li>');return;}
    close();out.push('<p>'+inline(l)+'</p>');
  });
  close(); return out.join('');
}
/* airy renderer for card answers:
   "## text"  -> step heading      "- text" -> bullet
   "--- "     -> soft divider      ">> text" -> highlighted takeaway
   blank line -> breathing space                                    */
function para(src){
  if(!src) return '';
  const ln = t => esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^\*])\*([^\*]+?)\*/g,'$1<em>$2</em>');
  const out=[]; let ul=false, tbl=null;
  const closeUl=()=>{ if(ul){out.push('</ul>');ul=false;} };
  const closeTbl=()=>{
    if(!tbl) return;
    const cells=r=>r.replace(/^\||\|$/g,'').split('|').map(c=>ln(c.trim()));
    let h='<table class="mini"><thead><tr>'+cells(tbl[0]).map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>';
    tbl.slice(1).forEach(r=>{ h+='<tr>'+cells(r).map(c=>`<td>${c}</td>`).join('')+'</tr>'; });
    out.push(h+'</tbody></table>'); tbl=null;
  };
  (src||'').split(/\r?\n/).forEach(raw=>{
    const l=raw.trim();
    if(/^\|.*\|$/.test(l)){
      if(/^\|[\s:|-]+\|$/.test(l)) return;      // separator row
      closeUl(); (tbl = tbl || []).push(l); return;
    }
    closeTbl();
    if(!l){ closeUl(); return; }
    if(/^-{3,}$/.test(l)){ closeUl(); out.push('<hr class="soft">'); return; }
    let m;
    if((m=l.match(/^\[\[img:(.+?)(?:\|(.*?))?\]\]$/))){
      closeUl(); out.push(imgBlock(m[1].split(',').map(s=>s.trim()), m[2]||'')); return;
    }
    if((m=l.match(/^!\[(.*?)\]\((.+?)\)$/))){
      closeUl(); out.push(imgBlock(m[2].replace(/^img\//,''), m[1])); return;
    }
    if((m=l.match(/^###\s+(.*)/))){ closeUl(); out.push(`<div class="substepq">${ln(m[1])}</div>`); return; }
    if((m=l.match(/^##\s+(.*)/))){ closeUl(); out.push(`<div class="stepq">${ln(m[1])}</div>`); return; }
    if((m=l.match(/^>>\s+(.*)/))){ closeUl(); out.push(`<div class="takeaway">${ln(m[1])}</div>`); return; }
    if((m=l.match(/^[-•]\s+(.*)/))){ if(!ul){out.push('<ul class="airy">');ul=true;} out.push('<li>'+ln(m[1])+'</li>'); return; }
    closeUl(); out.push('<p>'+ln(l)+'</p>');
  });
  closeUl(); closeTbl();
  return out.join('');
}

const allTopics=[];
DB.subjects.forEach(s=>s.modules.forEach(m=>m.topics.forEach(t=>
  allTopics.push(Object.assign({subject:s,module:m.name},t)))));
const subjById = id => DB.subjects.find(s=>s.id===id);
const topById  = id => allTopics.find(t=>t.id===id);
const lecById  = id => DB.lecturers.find(l=>l.id===id);

/* ==================================================================
   PROGRESS ENGINE — streaks, spaced repetition, status, saved place.
   Everything is kept in the browser's own storage on this device,
   so nothing is lost between sessions. Works from file:// too.
   ================================================================== */
const SKEY='medbank_v1';
const APP_VERSION='2026.07.23b';   // bump this each release
const LADDER=[3,7,14,30,60];           // days added after each correct answer
const DEFAULTS={goal:40,newPerDay:20,floor:10,budget:0};

let DATA = (()=>{
  let d={};
  try{ d=JSON.parse(localStorage.getItem(SKEY)||'{}'); }catch(e){ d={}; }
  d.cards    = d.cards    || {};  // cardId -> {box,due,seen,lapses}
  d.topics   = d.topics   || {};  // topicId -> 'inprogress' | 'complete'
  d.pos      = d.pos      || {};  // deckKey -> last card index
  d.log      = d.log      || {};  // 'YYYY-MM-DD' -> {cards,correct}
  d.streak   = d.streak   || {current:0,best:0,last:'',lastN:null,frozen:[]};
  d.streak.frozen = d.streak.frozen || [];
  d.starred  = d.starred  || {};  // cardId -> 1  (hard cards)
  d.done     = d.done     || {};  // topicId -> 'YYYY-MM-DD' completed
  d.read     = d.read     || {};  // topicId -> 'YYYY-MM-DD' simplified note read
  d.exams    = d.exams    || {};  // subjectId -> 'YYYY-MM-DD'
  d.settings = Object.assign({interleave:true, remindAt:'', remindOn:false, remindEvery:2, remindMins:0, strict:false, useIdle:false, lastNudge:0, quietStart:7, quietEnd:22}, d.settings||{});
  if(!d.settings.remindMins) d.settings.remindMins = (d.settings.remindEvery||2)*60;  // minutes is the source of truth
  d.flags    = d.flags    || {};  // misc unlock flags
  d.daily    = Object.assign({}, DEFAULTS, d.daily||{});
  return d;
})();
function persist(){ try{ localStorage.setItem(SKEY,JSON.stringify(DATA)); }catch(e){} }

/* ---- dates ---- */
function dayNum(d=new Date()){ return Math.floor(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/864e5); }
function dstr(d=new Date()){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
const yesterdayStr = () => dstr(new Date(Date.now()-864e5));

/* ---- stable per-card id (survives reordering) ---- */
function hstr(s){ let h=5381; s=s||''; for(let i=0;i<s.length;i++) h=((h<<5)+h+s.charCodeAt(i))|0; return (h>>>0).toString(36); }
function cid(topicId,deck,c){ return topicId+'|'+deck[0]+'|'+hstr(c.q); }

/* ---- topic status ---- */
function status(id){ return DATA.topics[id] || 'notstarted'; }
function setStatus(id,s){
  if(s==='notstarted') delete DATA.topics[id]; else DATA.topics[id]=s;
  if(s==='complete'){ if(!DATA.done[id]) DATA.done[id]=dstr(); }
  else delete DATA.done[id];
  persist();
}
function touchTopic(id){ if(status(id)==='notstarted'){ DATA.topics[id]='inprogress'; persist(); } }

/* ---- streak / daily log ---- */
function markActive(){
  const d=dstr();
  if(!DATA.log[d]) DATA.log[d]={cards:0,correct:0};
  bumpStreak(d);
  try{ if(typeof swPing==='function') swPing('studied',{date:d}); }catch(e){}
}
function freezeAvail(tN){ const fz=DATA.streak.frozen||[]; return !fz.some(n=>tN-n<7); }
function bumpStreak(d){
  const s=DATA.streak, tN=dayNum(new Date(d+'T00:00'));
  const lN = (s.lastN!=null) ? s.lastN : (s.last?dayNum(new Date(s.last+'T00:00')):null);
  if(lN===tN){ s.last=d; s.lastN=tN; return; }
  const gap = (lN==null) ? Infinity : tN-lN;
  if(gap===1)                          s.current=(s.current||0)+1;
  else if(gap===2 && freezeAvail(tN)){ (s.frozen=s.frozen||[]).push(tN-1); s.current=(s.current||0)+1; }
  else                                 s.current=1;
  s.last=d; s.lastN=tN; s.best=Math.max(s.best||0,s.current); persist();
}
function curStreak(){
  const s=DATA.streak, tN=dayNum();
  const lN=(s.lastN!=null)?s.lastN:(s.last?dayNum(new Date(s.last+'T00:00')):-1);
  const gap=tN-lN;
  if(gap<=1) return s.current||0;
  if(gap===2 && freezeAvail(tN)) return s.current||0;   // one grace day still coverable
  return 0;
}
function freezeState(){                                  // for display
  const tN=dayNum();
  return freezeAvail(tN) ? 'ready' : 'used';
}
function todayLog(){ return DATA.log[dstr()]||{cards:0,correct:0}; }
function logRate(ok){
  const d=dstr(), L=DATA.log[d]||{cards:0,correct:0};
  L.cards++; if(ok) L.correct++; DATA.log[d]=L; bumpStreak(d);
}

/* ---- spaced repetition (Recall cards only) ---- */
function rateSRS(id,ok){
  const today=dayNum(), s=DATA.cards[id]||{box:-1};
  if(ok){ s.box=Math.min((s.box<0?-1:s.box)+1, LADDER.length-1); s.due=today+LADDER[s.box]; }
  else  { s.box=-1; s.due=today+1; s.lapses=(s.lapses||0)+1; }
  s.seen=today; DATA.cards[id]=s;
}
const startedTopics = () => allTopics.filter(t=>t.ready && status(t.id)!=='notstarted');

/* ---- exam dates ---- */
function examDays(subId){ const d=DATA.exams[subId]; if(!d) return null; return dayNum(new Date(d+'T00:00'))-dayNum(); }
function subjectExamRank(){                        // subject ids ordered by nearest upcoming exam
  return DB.subjects.slice().sort((a,b)=>{
    const da=examDays(a.id), db=examDays(b.id);
    const va=(da==null||da<0)?9999:da, vb=(db==null||db<0)?9999:db; return va-vb;
  }).map(s=>s.id);
}
/* order a list of {t,...} items: mixed (shuffle) or blocked by subject/exam */
function orderItems(arr){
  if(DATA.settings.interleave){
    for(let i=arr.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
  }
  const rank=subjectExamRank();
  return arr.sort((x,y)=>rank.indexOf(x.t.subject.id)-rank.indexOf(y.t.subject.id));
}

/* build today's cross-topic Recall queue from started topics only */
function buildQueue(){
  const today=dayNum(), due=[], neu=[];
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const id=cid(t.id,'recall',c), st=DATA.cards[id], item={t,c,id};
    if(st){ if(st.due<=today) due.push(item); } else neu.push(item);
  }));
  const sh=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
  const neuCap = sh(neu).slice(0,DATA.daily.newPerDay);
  return { due:orderItems(due), neu:orderItems(neuCap), newTotal:neu.length };
}
/* collect recall cards matching a predicate, across started topics */
function collectRecall(pred){
  const out=[];
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const id=cid(t.id,'recall',c), st=DATA.cards[id];
    if(pred(st,t,c)) out.push({t,c,id,deck:'recall'});
  }));
  return out;
}
function weakCount(){ return collectRecall(st=>st&&st.box<0).length; }

/* ---- reading log ---- */
function isRead(id){ return !!DATA.read[id]; }
function markRead(id){ if(DATA.read[id]) delete DATA.read[id]; else DATA.read[id]=dstr(); persist(); render(); }
function readCount(){ return Object.keys(DATA.read).length; }

/* ---- level / XP ---- */
const LEVELS=[
  {n:'Pre-clinical',      xp:0},
  {n:'Clinical student',  xp:150},
  {n:'House officer',     xp:600},
  {n:'Registrar',         xp:1800},
  {n:'Senior registrar',  xp:4000},
  {n:'Consultant',        xp:8000},
  {n:'Professor',         xp:15000},
];
function totalXP(){ return totalCards() + completeCount()*25 + (DATA.streak.best||0)*5; }
function levelInfo(){
  const xp=totalXP(); let i=0;
  for(let k=0;k<LEVELS.length;k++) if(xp>=LEVELS[k].xp) i=k;
  const cur=LEVELS[i], next=LEVELS[i+1];
  return {name:cur.n, xp, i, next, pct: next?Math.min(100,Math.round((xp-cur.xp)/(next.xp-cur.xp)*100)):100,
          toNext: next?next.xp-xp:0};
}

/* ============ Active Recall engine ============ */
const SEC_PER_CARD=20;
function estMin(n){ return Math.max(1, Math.round(n*SEC_PER_CARD/60)); }
/* a due card's review-age bucket, from its SRS box */
function reviewBucket(box,starred){
  if(starred || box<0) return 'hard';
  if(box<=0) return 'd1';       // 24-hour (just learned / relapsed-then-passed)
  if(box===1) return 'd3';      // 3-study-day
  if(box===2) return 'wk';      // weekend
  return 'lt';                  // maturing / long-term
}
const BUCKETS=[
  {k:'hard', ic:'🔴', label:'Hard cards'},
  {k:'new',  ic:'🆕', label:'New cards'},
  {k:'d1',   ic:'🟡', label:'24-hour reviews'},
  {k:'d3',   ic:'🔵', label:'3-day reviews'},
  {k:'wk',   ic:'🟢', label:'Weekend reviews'},
  {k:'lt',   ic:'🟣', label:'Maturing reviews'},
  {k:'conf', ic:'🎲', label:'Confidence check'},
];
/* build a categorised, time-budgeted Active Recall session */
function buildRecallSession(){
  const today=dayNum(), due=[], neu=[];
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const id=cid(t.id,'recall',c), s=DATA.cards[id];
    if(s){ if(s.due<=today){ due.push({t,c,id,deck:'recall',box:s.box,starred:!!DATA.starred[id]}); } }
    else neu.push({t,c,id,deck:'recall',isNew:true});
  }));
  const sh=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
  const hard=sh(due.filter(x=>x.starred||x.box<0));
  const reviews=sh(due.filter(x=>!(x.starred||x.box<0))).sort((a,b)=>a.box-b.box); // youngest interval first
  const news=sh(neu).slice(0,DATA.daily.newPerDay);
  const ordered=hard.concat(reviews,news);
  // time budget (minutes; 0 = unlimited)
  const budget=DATA.daily.budget||0;
  let capped=ordered, over=0;
  if(budget>0){ const max=Math.max(1,Math.floor(budget*60/SEC_PER_CARD));
    if(ordered.length>max){ capped=ordered.slice(0,max); over=ordered.length-max; } }
  // confidence check: up to 5 mastered (box>=3), not currently due, not already in session
  const inSess=new Set(capped.map(x=>x.id)), mastered=[];
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const id=cid(t.id,'recall',c), s=DATA.cards[id];
    if(s&&s.box>=3&&s.due>today&&!inSess.has(id)) mastered.push({t,c,id,deck:'recall',conf:true});
  }));
  const conf=sh(mastered).slice(0,5);
  // per-bucket counts (from the capped set)
  const counts={hard:0,new:0,d1:0,d3:0,wk:0,lt:0,conf:conf.length};
  capped.forEach(x=>{ if(x.isNew) counts.new++; else counts[reviewBucket(x.box,x.starred)]++; });
  return {hard,reviews,news,capped,over,conf,counts,
    totalCards:capped.length+conf.length};
}
/* review health: how caught-up the whole system is.
   dueNow = due today or earlier; overdue = strictly past their date (you fell behind). */
function reviewHealth(){
  const today=dayNum(); let dueNow=0, overdue=0; const waiting=new Set();
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const s=DATA.cards[cid(t.id,'recall',c)];
    if(s&&s.due<=today){ dueNow++; waiting.add(t.id); if(s.due<today) overdue++; }
  }));
  const goal=DATA.daily.goal||40;
  let pct = overdue===0 ? 100 : Math.max(20, Math.round(100 - overdue/(2*goal)*100));
  const st = pct>=85 ? {k:'good',ic:'🟢',label:'On schedule'}
           : pct>=60 ? {k:'ok',  ic:'🟡',label:'Slightly behind'}
           :            {k:'bad', ic:'🔴',label:'Falling behind'};
  return {pct,dueNow,overdue,hard:starCount(),topicsWaiting:waiting.size,status:st};
}
/* a topic's position along the spaced-repetition pipeline (0..5), -1 = not reviewed */
const STAGE_NAMES=['Learning','24-hour','3-day','Weekend','Weekly','Long-term'];
function topicStage(t){
  const rc=t.recall||[]; if(!rc.length) return -1;
  const seen=rc.map(c=>DATA.cards[cid(t.id,'recall',c)]).filter(Boolean);
  if(!seen.length) return -1;
  const avg=seen.reduce((a,s)=>a+Math.max(0,s.box),0)/seen.length;
  return Math.min(5, Math.round(avg));
}
function dueCount(){
  const today=dayNum(); let n=0;
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{
    const st=DATA.cards[cid(t.id,'recall',c)]; if(st && st.due<=today) n++;
  }));
  return n;
}
/* subject / topic progress helpers */
function topicMastery(t){       // fraction of recall cards answered right at least once
  const rc=t.recall||[]; if(!rc.length) return 0;
  let m=0; rc.forEach(c=>{ const s=DATA.cards[cid(t.id,'recall',c)]; if(s&&s.box>=0) m++; });
  return m/rc.length;
}
function subjProgress(s){
  const built=s.modules.flatMap(m=>m.topics).filter(t=>t.ready);
  if(!built.length) return {pct:0,done:0,learning:0,built:0};
  let done=0,learning=0;
  built.forEach(t=>{ const st=status(t.id); if(st==='complete')done++; else if(st==='inprogress')learning++; });
  return { pct:Math.round((done+learning*0.5)/built.length*100), done, learning, built:built.length };
}
function lecProgress(l){
  const built=l.topics.filter(t=>t.ready);
  if(!built.length) return {pct:0,done:0,learning:0,built:0};
  let done=0,learning=0;
  built.forEach(t=>{ const st=status(t.id); if(st==='complete')done++; else if(st==='inprogress')learning++; });
  return { pct:Math.round((done+learning*0.5)/built.length*100), done, learning, built:built.length };
}

function weekStats(){
  const days=[]; for(let i=6;i>=0;i--) days.push(dstr(new Date(Date.now()-i*864e5)));
  let cards=0,correct=0,active=0;
  days.forEach(d=>{ const l=DATA.log[d]; if(l){ cards+=l.cards||0; correct+=l.correct||0; if(l.cards)active++; } });
  const since=dstr(new Date(Date.now()-6*864e5));
  const completed=Object.entries(DATA.done).filter(([id,d])=>d>=since).length;
  // weakest lecturer = most currently-lapsed recall cards (box -1) among started topics
  const lap={};
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{ const s=DATA.cards[cid(t.id,'recall',c)];
    if(s&&s.box<0) lap[t.lecturer]=(lap[t.lecturer]||0)+1; }));
  let weak=null,wn=0; Object.entries(lap).forEach(([n,c])=>{ if(c>wn){wn=c;weak=n;} });
  return {days,cards,correct,active,completed,
    acc:cards?Math.round(correct/cards*100):0, perDay:Math.round(cards/7),
    weak, weakN:wn};
}

/* preset study modes */
function startSession(mode){
  let items=[], label='';
  if(mode==='quick'){ const q=buildQueue(); items=q.due.concat(q.neu).map(x=>({t:x.t,c:x.c,id:x.id,deck:'recall'})).slice(0,10); label='Quick 10'; }
  else if(mode==='weak'){ items=orderItems(collectRecall(st=>st&&st.box<0)); label='Weak spots'; }
  else if(mode==='cram'){ items=collectRecall(()=>true);
    for(let i=items.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[items[i],items[j]]=[items[j],items[i]];}
    items=items.slice(0,40); label='Exam cram'; }
  else { startToday(); return; }                 // 'due'
  S={mode:'daily',key:'sess:'+mode,label,items,order:items.map((_,k)=>k),i:0,show:false,
     session:{done:0,correct:0,total:items.length}};
}

/* ---- notification nudge: a MIX of hard + due cards ---- */
function nudgeItems(max){
  max=max||8; const today=dayNum();
  const hard=starItems();
  const due=[];
  startedTopics().forEach(t=>(t.recall||[]).forEach(c=>{ const id=cid(t.id,'recall',c), s=DATA.cards[id];
    if(s && s.due<=today && !DATA.starred[id]) due.push({t,c,id,deck:'recall'}); }));
  const sh=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
  sh(hard); sh(due);
  const out=[]; let hi=0,di=0;                    // interleave ~1 hard : 2 due
  while(out.length<max && (hi<hard.length||di<due.length)){
    if(hi<hard.length) out.push(Object.assign({hard:true},hard[hi++]));
    if(out.length<max && di<due.length) out.push(due[di++]);
    if(out.length<max && di<due.length) out.push(due[di++]);
  }
  return out;
}
function startNudgeSession(){
  const items=nudgeItems(10);
  S={mode:'daily',key:'nudge',label:'Quick review',items,order:items.map((_,k)=>k),i:0,show:false,
     session:{done:0,correct:0,total:items.length}};

/* build the notification body carrying the actual card Q&A */
function nudgeBody(items){
  const clip=(s,n)=>{ s=(s||'').replace(/\s+/g,' ').trim(); return s.length>n?s.slice(0,n-1)+'…':s; };
  const lines=items.slice(0,3).map(it=>{
    const ic=it.hard?'🔴':'🔵';
    const a=it.deck==='primer'?(it.c.lecturer||''):it.c.a;
    return `${ic} ${clip(it.c.q,90)}\n     ↳ ${clip(a,100)}`;
  });
  const more=items.length-3;
  return lines.join('\n\n') + (more>0?`\n\n+ ${more} more · tap to drill`:`\n\nTap to drill`);
}
/* short in-app beep alarm (only works while the app is open) */
function playAlarm(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    const ac=new AC();
    [0,0.45,0.9].forEach(dt=>{ const o=ac.createOscillator(), g=ac.createGain();
      o.type='square'; o.frequency.value=880; o.connect(g); g.connect(ac.destination);
      const t=ac.currentTime+dt;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(0.3,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
      o.start(t); o.stop(t+0.34);
    });
    setTimeout(()=>{ try{ac.close();}catch(e){} },1600);
  }catch(e){}
}

/* Idle Detection (Android/Chrome): nudge sooner when the phone is unlocked & in use.
   Only runs while MedBank's worker is alive; unsupported/blocked on iPhone. */
let _idleDet=null;
async function startIdle(requestIfNeeded){
  try{
    if(!DATA.settings.useIdle || !('IdleDetector' in window)) return;
    let state='denied';
    try{ state=(await navigator.permissions.query({name:'idle-detection'})).state; }catch(e){}
    if(state!=='granted'){
      if(!requestIfNeeded) return;
      const p=await window.IdleDetector.requestPermission();
      if(p!=='granted'){ DATA.settings.useIdle=false; persist(); return; }
    }
    if(_idleDet) return;                       // already watching
    _idleDet=new window.IdleDetector();
    _idleDet.addEventListener('change',()=>{
      // fire when the user is active AND the screen is unlocked = phone in use
      if(_idleDet.userState==='active' && _idleDet.screenState==='unlocked') nudgeTick(false);
    });
    await _idleDet.start({threshold:60000});
  }catch(e){}
}

/* the recurring check — fires a nudge every N minutes while conditions are met */
let _lastTickShown=0;
function nudgeTick(force){
  try{
    const s=DATA.settings;
    if(!s.remindOn) return;
    if(!('Notification' in window) || Notification.permission!=='granted') return;
    const hr=new Date().getHours();
    if(!force && (hr<(s.quietStart||7) || hr>=(s.quietEnd||22))) return;   // quiet hours
    const every=Math.max(5,(s.remindMins||120))*60e3;
    const now=Date.now();
    if(!force && now-(s.lastNudge||0) < every) return;
    if(todayLog().cards>0 && (now-(s.lastNudge||0)) < every) { /* studied recently is fine */ }
    const items=nudgeItems(10);
    if(!items.length) return;                     // nothing to review — no nag
    s.lastNudge=now; persist();
    const body=nudgeBody(items), url='./index.html#/nudge';
    swPing('notify',{body,url,strict:s.strict});
    swPing('payload',{body,url});
    if(document.visibilityState==='visible' && now-_lastTickShown>5000){
      _lastTickShown=now; playAlarm();
      if(s.strict) strictOverlay(items.length);
    }
  }catch(e){}
}

function planItem(state,icon,title,desc,action){

/* shared card renderer — deck mode and session (daily/hard) mode */
function cardView(session){
  const it=S.items[S.order[S.i]], c=it.c, t=it.t, deck=it.deck, isP=deck==='primer';
  const col=isP?'var(--primer)':'var(--recall)';
  const n=S.items.length, pctBar=((S.i+1)/n*100).toFixed(1), star=isStar(it.id);
  let ans='';
  if(S.show){
    ans = isP
      ? `<div class="ansblock">
          <div class="seg lecturer"><div class="seglabel" style="background:#8895aa22;color:var(--dim)">In the lecturer's words</div><div class="body">${para(c.lecturer)}</div></div>
          <div class="seg"><div class="seglabel" style="background:#4f8cff22;color:var(--primer)">Explained</div><div class="body">${para(c.explain)}</div></div>
          ${c.tie?`<div class="seg tie"><div class="seglabel" style="background:#ffb45422;color:var(--com)">Why it matters here</div><div class="body">${para(c.tie)}</div></div>`:''}
        </div>`
      : `<div class="ansblock"><div class="seg"><div class="seglabel" style="background:#3ecf8e22;color:var(--recall)">Answer</div><div class="body">${para(c.a)}</div></div></div>`;
  }
  const canRate = !isP;
  let controls;
  if(canRate && S.show){
    controls = `<div class="ratebtns">
         <button class="btn miss" onclick="event.stopPropagation();rateCard(false)">✗ Missed</button>
         <button class="btn got" onclick="event.stopPropagation();rateCard(true)">✓ Got it</button></div>
       <div class="kbd">1 = missed · 2 = got it · Space reveals</div>`;
  } else if(session){
    const showNext = !canRate && S.show;                       // primer card in a session
    controls = `<div class="navbtns">
         <button class="btn" onclick="event.stopPropagation();reveal()">${S.show?'Hide':'Reveal'}</button>
         ${showNext?`<button class="btn primary" onclick="event.stopPropagation();sessionNext()">${S.i>=n-1?'Finish':'Next →'}</button>`:''}</div>
       <div class="kbd">Space reveals</div>`;
  } else {
    controls = `<div class="navbtns">
         <button class="btn" onclick="event.stopPropagation();step(-1)" ${S.i===0?'disabled':''}>← Prev</button>
         <button class="btn" onclick="event.stopPropagation();reveal()">${S.show?'Hide':'Reveal'}</button>
         <button class="btn primary" onclick="event.stopPropagation();step(1)" ${S.i>=n-1?'disabled':''}>Next →</button></div>
       <div class="btnrow" style="margin-top:12px;justify-content:center">
         <button class="btn" onclick="shuffle()">⇄ Shuffle</button>
         <button class="btn" onclick="restartDeck()">↺ Restart</button></div>
       <div class="kbd">Space reveals · ← → move between cards</div>`;
  }
  return `<div class="studywrap">
    <div class="studytop">
      <span class="pill" style="background:${col}22;color:${col};margin:0">${session?esc(t.name):(isP?'Primer · Deck A':'Recall · Deck B')}</span>
      <span class="name">${session?('◎ '+(isP?'Primer':'Recall')):esc(t.name)}</span>
      <span class="counter">${S.i+1} / ${n}</span></div>
    <div class="bar"><div style="width:${pctBar}%;background:${col}"></div></div>
    <div class="flash" onclick="reveal()">
      <button class="starbtn ${star?'on':''}" title="Star as a hard card" onclick="event.stopPropagation();toggleStar('${it.id}')">${star?'★':'☆'}</button>
      <div class="qlabel">${c.img?'Look at this — then answer':'Question'}${session?' · '+esc(t.subject.short):''}</div>
      <div class="q">${esc(c.q)}</div>
      ${c.img?`<div onclick="event.stopPropagation()">${imgBlock(c.img,c.imgCaption||'')}</div>`:''}
      ${ans || '<div class="taphint">Tap to reveal</div>'}</div>
    ${controls}</div>`;
}

function reveal(){
  if(!S) return;
  if(!S.show){ markActive(); const it=S.items[S.order[S.i]]; if(it) touchTopic(it.t.id); }
  S.show=!S.show; render();
}
function step(d){ if(!S)return; const n=S.i+d; if(n<0||n>=S.items.length)return;
  S.i=n; S.show=false;
  if(S.mode==='deck'){ DATA.pos['pos:'+S.t.id+S.deck]=S.i; persist(); }
  render(); window.scrollTo(0,0);
}
function shuffle(){ if(!S)return; for(let i=S.order.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[S.order[i],S.order[j]]=[S.order[j],S.order[i]];} S.i=0;S.show=false;render(); }
function restartDeck(){ if(!S)return; S.i=0;S.show=false;S.order=S.items.map((_,k)=>k);
  if(S.mode==='deck'){DATA.pos['pos:'+S.t.id+S.deck]=0;persist();} render(); }
function sessionNext(){                       // advance a non-rated (primer) card inside a session
  if(!S) return; S.session.done++;
  if(S.i>=S.items.length-1){ S.i=S.items.length; S.show=false; render(); window.scrollTo(0,0); return; }
  S.i++; S.show=false; render(); window.scrollTo(0,0);
}
function celebrate(kind,text){
  try{ if(navigator.vibrate) navigator.vibrate(kind==='goal'||kind==='level'?[30,40,30]:20); }catch(e){}
  const host=document.createElement('div'); host.className='celebrate';
  const emo = kind==='level'?['🎓','⭐','🎉','✨']:kind==='streak'?['🔥','🔥','✨','🎉']:['🎉','✨','🎊','⭐','💪'];
  let bits='';
  for(let i=0;i<18;i++){ const e=emo[i%emo.length];
    bits+=`<span style="left:${Math.random()*100}%;animation-delay:${(Math.random()*0.3).toFixed(2)}s;font-size:${(14+Math.random()*16)|0}px">${e}</span>`; }
  host.innerHTML=`<div class="celebits">${bits}</div>${text?`<div class="celebanner">${esc(text)}</div>`:''}`;
  document.body.appendChild(host);
  setTimeout(()=>host.remove(),1900);
}
function rateCard(ok){
  if(!S) return; const it=S.items[S.order[S.i]]; if(!it) return;
  const beforeCards=todayLog().cards, beforeLvl=levelInfo().i, beforeStreak=curStreak(), goal=DATA.daily.goal, floor=DATA.daily.floor;
  markActive();
  if(it.conf){ if(!ok) rateSRS(it.id,false); }   // confidence check: correct = no change, miss = re-enter pipeline
  else rateSRS(it.id,ok);
  logRate(ok); touchTopic(it.t.id);
  S.session.done++; if(ok)S.session.correct++;
  if(S.mode==='deck') DATA.pos['pos:'+S.t.id+S.deck]=Math.min(S.i+1,S.items.length-1);
  persist();
  // micro-celebrations
  const afterCards=todayLog().cards, afterLvl=levelInfo().i, afterStreak=curStreak();
  if(afterLvl>beforeLvl)                         celebrate('level','Level up · '+LEVELS[afterLvl].n);
  else if(beforeCards<goal && afterCards>=goal)  celebrate('goal','🎉 Daily goal complete!');
  else if(beforeCards<floor && afterCards>=floor)celebrate('floor','✓ Minimum day done');
  else if(afterStreak>beforeStreak && afterStreak%7===0) celebrate('streak','🔥 '+afterStreak+'-day streak!');
  if(S.i>=S.items.length-1){
    if(S.mode!=='deck'){ S.i=S.items.length; render(); window.scrollTo(0,0); return; }
    S.show=false; render(); return;            // deck: stay on last card
  }
  S.i++; S.show=false; render(); window.scrollTo(0,0);
}
document.addEventListener('keydown',e=>{
  const h=location.hash;
  if(!/^#\/(study|review|hard)/.test(h)) return;
  if(!S) return;
  if(e.code==='Space'){ e.preventDefault(); reveal(); return; }
  const it=S.items[S.order[S.i]], canRate=it && it.deck!=='primer';
  if(canRate && S.show){ if(e.key==='1')rateCard(false); if(e.key==='2')rateCard(true); return; }
  if(!canRate && (S.mode==='daily'||S.mode==='hard') && S.show){ if(e.key==='ArrowRight')sessionNext(); return; }
  if(e.key==='ArrowRight')step(1);
  if(e.key==='ArrowLeft')step(-1);
});

let SQ='';
function pageSearch(){
  return `<h1>Search</h1>

function searchRun(){
  const box=document.getElementById('sres'); if(!box) return;
  const q=SQ.trim().toLowerCase();
  if(q.length<2){ box.innerHTML='<p class="sub">Type at least 2 letters.</p>'; return; }
  const topics=allTopics.filter(t=>((t.name+' '+t.lecturer)||'').toLowerCase().includes(q)).slice(0,25);
  const cardHits=[];
  allTopics.forEach(t=>{ if(!t.ready) return;
    ['primer','recall'].forEach(dk=>(t[dk]||[]).forEach(c=>{
      if((c.q||'').toLowerCase().includes(q)) cardHits.push({t,dk,c});
    }));
  });
  let h='';
  if(topics.length){
    h+=`<div class="modhead">Topics · ${topics.length}</div><div class="rows">${topics.map(t=>topicRow(t,true)).join('')}</div>`;
  }
  if(cardHits.length){
    h+=`<div class="modhead" style="margin-top:26px">Card questions · ${cardHits.length}</div><div class="rows">`+
      cardHits.slice(0,40).map(x=>`
       <div class="row" onclick="go('study/${x.t.id}/${x.dk}')">
         <span class="sn">${x.dk==='primer'?'A':'B'}</span>
         <span class="mid"><span class="tt">${esc(x.c.q)}</span>
           <div class="meta">${esc(x.t.name)} · ${x.dk==='primer'?'Primer':'Recall'}</div></span></div>`).join('')+
      `</div>${cardHits.length>40?`<p class="sub" style="margin-top:10px">Showing first 40 of ${cardHits.length}.</p>`:''}`;
  }
  if(!topics.length && !cardHits.length) h=`<div class="empty">No matches for “${esc(SQ)}”.</div>`;
  box.innerHTML=h;
}

  if(!('Notification' in window)){ alert('Notifications are not supported here.'); return; }

  if(!items.length){ alert('No hard or due cards to show yet — study a topic first, then star a few cards.'); return; }
  DATA.settings.lastNudge=Date.now(); persist();
  swPing('notify',{body:nudgeBody(items),url:'./index.html#/nudge',strict:DATA.settings.strict});
  swPing('payload',{body:nudgeBody(items),url:'./index.html#/nudge'});

}

/* ---------- PWA: update, install, service worker, reminders ---------- */
/* force the newest version: clear caches, update the worker, reload */
let _updating=false;
async function forceUpdate(){
  if(_updating) return; _updating=true;
  const b=document.getElementById('updbtn'); if(b){ b.textContent='Updating…'; }
  try{
    if('caches' in window){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); }
    if('serviceWorker' in navigator){
      const reg=await navigator.serviceWorker.getRegistration();
      if(reg){ try{ await reg.update(); }catch(e){} if(reg.waiting) reg.waiting.postMessage({type:'skipWaiting'}); }
    }
  }catch(e){}
  setTimeout(()=>{ try{ location.reload(); }catch(e){ location.href=location.href; } }, 250);
}
function showUpdateBanner(){
  if(document.getElementById('updbanner')) return;
  const b=document.createElement('div'); b.id='updbanner'; b.className='updbanner';
  b.innerHTML=`<span>🔄 A new version of MedBank is ready.</span>
     <button class="btn primary" onclick="forceUpdate()">Refresh now</button>
     <button class="btn" onclick="this.parentNode.remove()">Later</button>`;
  document.body.appendChild(b);
}
let deferredInstall=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredInstall=e;
  const b=document.getElementById('installbtn'); if(b) b.style.display='inline-flex'; });
async function doInstall(){
  if(!deferredInstall){ alert('To install: on iPhone use Share → “Add to Home Screen”; on Android use the browser menu → “Install app”.'); return; }
  deferredInstall.prompt(); try{ await deferredInstall.userChoice; }catch(e){} deferredInstall=null;
  const b=document.getElementById('installbtn'); if(b) b.style.display='none';
}
function swPing(type,extra){ try{ if(navigator.serviceWorker&&navigator.serviceWorker.controller)
  navigator.serviceWorker.controller.postMessage(Object.assign({type},extra||{})); }catch(e){} }
async function setupReminder(){
  try{
    const reg=await navigator.serviceWorker.ready;
    const every=Math.max(5,(DATA.settings.remindMins||120))*60e3;
    if('periodicSync' in reg){
      const st=await navigator.permissions.query({name:'periodic-background-sync'}).catch(()=>({state:'denied'}));
      if(st.state==='granted'){ try{ await reg.periodicSync.register('medbank-nudge',{minInterval:every}); }catch(e){} }
    }
    // pre-stage current cards so a background notification can carry them
    const items=nudgeItems(10); if(items.length) swPing('payload',{body:nudgeBody(items),url:'./index.html#/nudge'});
  }catch(e){}
}
if('serviceWorker' in navigator){
  // when a new worker takes control, reload once to load the fresh app
  let _swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{ if(_swReloaded)return; _swReloaded=true; location.reload(); });
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').then(reg=>{
    // detect a newly downloaded version and offer to refresh
    reg.addEventListener('updatefound',()=>{ const nw=reg.installing; if(!nw)return;
      nw.addEventListener('statechange',()=>{ if(nw.state==='installed' && navigator.serviceWorker.controller) showUpdateBanner(); }); });
    if(DATA.settings.remindOn) setupReminder();
    if(DATA.settings.useIdle) startIdle(false);
    swPing('hardcount',{n:starCount()});     // keep the SW's hard-card count current
    // catch-up nudge on open, then a recurring check every minute
    setTimeout(()=>nudgeTick(false), 1500);
    setInterval(()=>nudgeTick(false), 60e3);
  }).catch(()=>{}); });
  // re-check whenever the app is brought back to the foreground
  document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') nudgeTick(false); });
}

/* ---- edge-swipe to open/close the sidebar on touch devices ---- */
(function(){
  let x0=null,y0=null,t0=0,tracking=false;
  const isMobile=()=>window.matchMedia('(max-width:820px)').matches;
  document.addEventListener('touchstart',e=>{
    if(!isMobile()||e.touches.length!==1){tracking=false;return;}
    const t=e.touches[0]; x0=t.clientX; y0=t.clientY; t0=Date.now();
    const open=document.body.classList.contains('navopen');
    // track an open-swipe only if it begins near the left edge, or any swipe while the menu is open
    tracking = open || x0 < Math.min(46, window.innerWidth*0.12);
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!tracking||x0==null){x0=y0=null;return;}
    const t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    const open=document.body.classList.contains('navopen');
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.6 && (Date.now()-t0)<700){
      if(dx>0 && !open) document.body.classList.add('navopen');    // swipe right → open
      else if(dx<0 && open) document.body.classList.remove('navopen'); // swipe left → close
    }
    x0=y0=null; tracking=false;
  },{passive:true});
})();

/* debug hook (harmless): lets tooling inspect the live study state */
window.__mb={get S(){return S;},set S(v){S=v;},get DATA(){return DATA;}};
render();
